name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # !! DELIBERATE VIOLATION (integ-pin-third-party-actions, Handbook · ci-gate → WARN) !!
      # Third-party actions referenced by moving tag instead of a pinned commit digest.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --test
